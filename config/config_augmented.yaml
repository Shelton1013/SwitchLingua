pre_execute:
  cs_ratio:
    - "70%"
    - "50%"
    - "30%"
  use_tools: true
  topics:
    - "business"
    - "entertainment"
    - "general"
    - "health"
    - "nation"
    - "science"
    - "sports"
    - "technology"
    - "world"
    
  tense:
    - "Past"
    - "Present"
    - "Future"
  perspective:
    - "First Person"
    - "Third Person"
  cs_function:
    - "Directive"
    - "Expressive"
    - "Referential"
    - "Phatic"
    - "Metalinguistic"
    - "Poetic"
  cs_type:
    - "Intrasentential"
    - "Intersentential"
    - "Extra-sentential / Tag switching"
  character_setting:
    nationality:
      first_language: "Cantonese"
      second_language: "English"
    age:
      - "8-17"
      - "18-25"
      - "26-35"
      - "56-65"
      - "66+"
    gender:
      - "Male"
      - "Female"
    education_level:
      - "High School"
      - "College"
      - "Master"
      - "Doctor"
  conversation_type:
    - "single_turn"
    - "multi-turn"
  output_format:
    "json"
    
  

on_execute:
  round: 1
  verbose: true


